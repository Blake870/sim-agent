name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
        env:
          # Baked into the binary so users don't set it. Set via the repo variable
          # AGENT_SERVER_URL (Settings → Secrets and variables → Actions → Variables);
          # falls back to the prod URL so a missing variable never bakes an empty URL.
          SIM_AGENT_SERVER_URL: ${{ vars.AGENT_SERVER_URL || 'https://sim.gudoguy.com' }}
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}
          path: build/sim-agent-*
          if-no-files-found: error

  release:
    name: sign, attest & publish
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write        # create the release + upload assets
      id-token: write        # OIDC for build provenance
      attestations: write    # write the attestation
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: dist
          merge-multiple: true

      - name: Checksums
        working-directory: dist
        run: sha256sum sim-agent-* > SHA256SUMS

      - name: Sign with minisign
        working-directory: dist
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          sudo apt-get update && sudo apt-get install -y minisign
          printf '%s\n' "$MINISIGN_SECRET_KEY" > minisign.key
          for f in sim-agent-* SHA256SUMS; do
            minisign -S -s minisign.key -m "$f"
          done
          rm -f minisign.key

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: dist/sim-agent-*

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/sim-agent-*
            dist/SHA256SUMS
            dist/*.minisig
