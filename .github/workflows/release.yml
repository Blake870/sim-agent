name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
        env:
          # Baked into the binary so users don't set it. Set via the repo variable
          # AGENT_SERVER_URL (Settings → Secrets and variables → Actions → Variables);
          # falls back to the prod URL so a missing variable never bakes an empty URL.
          SIM_AGENT_SERVER_URL: ${{ vars.AGENT_SERVER_URL || '' }}
          # Poke-channel gateway WS URL, baked in the same way (repo variable
          # AGENT_GATEWAY_URL). Left empty by default: the agent then derives it from the
          # server URL (https://host → wss://host/agent-ws). Set the variable only when the
          # gateway is reachable at a different host/path than the main server.
          SIM_AGENT_GATEWAY_URL: ${{ vars.AGENT_GATEWAY_URL || '' }}
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}
          path: build/sim-agent-*
          if-no-files-found: error

  release:
    name: sign, attest & publish
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write        # create the release + upload assets
      id-token: write        # OIDC for build provenance
      attestations: write    # write the attestation
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: dist
          merge-multiple: true

      - name: Checksums
        working-directory: dist
        run: sha256sum sim-agent-* > SHA256SUMS

      - name: Sign with minisign
        working-directory: dist
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          sudo apt-get update && sudo apt-get install -y minisign
          printf '%s\n' "$MINISIGN_SECRET_KEY" > minisign.key
          for f in sim-agent-* SHA256SUMS; do
            minisign -S -s minisign.key -m "$f"
          done
          rm -f minisign.key

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: dist/sim-agent-*

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          # Two NON-overlapping globs, each asset exactly once:
          #   dist/sim-agent-*  -> the binaries + their .minisig
          #   dist/SHA256SUMS*  -> SHA256SUMS + SHA256SUMS.minisig
          # Never use `dist/*` (would upload a stray minisign.key) or overlapping globs like
          # `dist/sim-agent-*` + `dist/*.minisig` (double-lists sigs -> gh 422 "already exists").
          files=(dist/sim-agent-* dist/SHA256SUMS*)
          # Idempotent: drop any existing release for this tag (keeping the git tag), then
          # recreate it cleanly. Handles re-runs and partial/failed prior publishes.
          gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes 2>/dev/null || true
          gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes "${files[@]}"

      - name: Refresh SIM latest-release cache
        # Nudge SIM to drop its hourly "latest release" cache now that the release is live, so
        # agents are told to upgrade immediately instead of after the cache expires. Non-fatal:
        # a SIM outage or unset secret must never fail an otherwise-good release.
        env:
          SIM_URL: ${{ vars.AGENT_SERVER_URL || 'https://sim.gudoguy.com' }}
          TOKEN: ${{ secrets.SIM_RELEASE_REFRESH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then echo "SIM_RELEASE_REFRESH_TOKEN not set — skipping cache refresh"; exit 0; fi
          curl -fsS --max-time 15 --retry 3 --retry-delay 5 -X POST "$SIM_URL/api/agent/release-refresh" \
            -H "Authorization: Bearer $TOKEN" -H "Accept: application/json" \
            && echo "SIM cache refreshed" || echo "SIM refresh call failed (non-fatal)"
